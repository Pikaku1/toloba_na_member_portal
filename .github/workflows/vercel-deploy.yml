name: Vercel Prebuilt Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VITE_CONVEX_URL_MEMBER: ${{ secrets.VITE_CONVEX_URL_MEMBER }}
  VITE_CONVEX_URL_ADMIN: ${{ secrets.VITE_CONVEX_URL_ADMIN }}

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rolldown Linux binding (CI workaround)
        run: npm install --no-save @rolldown/binding-linux-x64-gnu

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}"
          test -n "${{ secrets.VERCEL_ORG_ID }}"
          test -n "${{ secrets.VERCEL_PROJECT_ID }}"

      - name: Pull Vercel project settings (Preview)
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Write CI env file for build
        run: |
          : > .env.production.local

      - name: Build prebuilt artifacts
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt artifacts (Preview)
        id: deploy_preview
        run: |
          deployment_url="$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment URL: $deployment_url"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploymentUrl = `${{ steps.deploy_preview.outputs.deployment_url }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview deployment ready: ${deploymentUrl}`,
            });

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rolldown Linux binding (CI workaround)
        run: npm install --no-save @rolldown/binding-linux-x64-gnu

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}"
          test -n "${{ secrets.VERCEL_ORG_ID }}"
          test -n "${{ secrets.VERCEL_PROJECT_ID }}"

      - name: Pull Vercel project settings (Production)
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Write CI env file for build
        run: |
          : > .env.production.local

      - name: Build prebuilt artifacts (Production)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt artifacts (Production)
        run: |
          production_url="$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "Production deployment URL: $production_url"
